name: Python Package

on:
  push:
    tags:
      - "memect-ppx-*-released"
  workflow_dispatch:

jobs:
  check-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install memect-ppx
        run: |
          uv sync --index-url https://pypi.org/simple

      - name: Install opencv
        run: |
          uv pip install opencv-contrib-python-headless --no-config

      - name: Verify CLI entry point
        run: |
          uv run ppx --help

  build:
    needs: [check-install]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: |
          uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        id: cliff
        run: |
          git-cliff --config cliff.toml --latest --strip header > RELEASE_NOTES.md
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat RELEASE_NOTES.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.cliff.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Publish to PyPI
        run: |
          pip install -U uv
          uv publish dist/* --token ${{ secrets.PYPI_TOKEN }}