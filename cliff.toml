# ==============================================================================
# git-cliff configuration
#
# Purpose: generate CHANGELOG.md from git history
# Style:   Keep a Changelog + Conventional Commits
# Docs:    https://git-cliff.org/docs/configuration
# ==============================================================================

[changelog]
header = """
<!-- markdownlint-disable MD024 -->
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/).

"""

body = """
{% if version %}\
    ## [{{ version | split(pat="-") | slice(start=2, end=3) | first }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

footer = """
<!-- generated by git-cliff -->
"""

trim = true
postprocessors = []

# ==============================================================================
# Git parsing and grouping
# ==============================================================================
[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false

commit_parsers = [
  { message = "^feat",     group = "✨ Features" },
  { message = "^fix",      group = "🐛 Fixes" },
  { message = "^refactor", group = "♻️ Refactor" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^docs",     group = "📝 Documentation" },
  { message = "^test",     group = "✅ Tests" },
  { message = "^build",    group = "🔧 Build" },
  { message = "^ci",       group = "🤖 CI/CD" },
  { message = "^style",    group = "💄 Style" },
  { message = "^chore",    group = "🔨 Chore" },
  { message = "^revert",   group = "⏪ Revert" },
  { message = "^other",    group = "🔨 Chore" },
  { message = ".*",        group = "📌 Miscellaneous" },
]

filter_commits = false
topo_order = false
sort_commits = "newest"

# Only recognize tags matching "memect-ppx-<version>-released"
tag_pattern = "memect-ppx-[0-9].*-released"
# Ignore malformed historical tags (e.g. an accidental "push" tag)
ignore_tags = "^(push)$"
